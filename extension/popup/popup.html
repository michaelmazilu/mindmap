<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindmap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 248px;
      background: #08080a;
      color: #c8c8cc;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
    }

    .hdr {
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255, 80, 0, 0.12);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .hdr h1 {
      font-size: 13px;
      font-weight: 600;
      color: #eee;
      letter-spacing: -0.02em;
    }

    .hdr .ver {
      font-size: 10px;
      color: rgba(255, 80, 0, 0.75);
      font-variant-numeric: tabular-nums;
    }

    .main {
      padding: 10px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .row span {
      color: rgba(220, 220, 225, 0.9);
      font-size: 12px;
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #141418;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 9px;
      transition: background 0.15s, border-color 0.15s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 2px;
      top: 2px;
      background: #4a4a52;
      border-radius: 50%;
      transition: transform 0.15s, background 0.15s;
    }

    .toggle input:checked + .toggle-slider {
      background: rgba(255, 80, 0, 0.22);
      border-color: rgba(255, 80, 0, 0.45);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(14px);
      background: #ff5014;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slider-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .slider-top span:first-child {
      color: rgba(220, 220, 225, 0.85);
      font-size: 11px;
    }

    .slider-val {
      font-size: 11px;
      color: rgba(255, 80, 0, 0.85);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: #141418;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff5014;
      cursor: pointer;
      border: 2px solid #08080a;
    }

    details.advanced {
      margin-top: 2px;
    }

    details.advanced summary {
      list-style: none;
      cursor: pointer;
      font-size: 10px;
      color: rgba(255, 80, 0, 0.55);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 0;
    }

    details.advanced summary::-webkit-details-marker {
      display: none;
    }

    details.advanced summary::after {
      content: ' +';
      opacity: 0.7;
    }

    details.advanced[open] summary::after {
      content: ' −';
    }

    .adv-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 6px;
    }

    .adv-body label {
      font-size: 10px;
      color: rgba(150, 150, 155, 0.65);
      display: block;
      margin-bottom: 3px;
    }

    .text-input {
      width: 100%;
      padding: 6px 8px;
      background: #0e0e11;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      color: #bbb;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      outline: none;
    }

    .text-input:focus {
      border-color: rgba(255, 80, 0, 0.35);
    }

    .text-input::placeholder {
      color: rgba(90, 90, 95, 0.7);
    }

    .foot {
      padding: 8px 14px 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    .dot.on {
      background: #ff5014;
      box-shadow: 0 0 8px rgba(255, 80, 0, 0.45);
    }

    .dot.off {
      background: #3a3a40;
    }

    .dot.warn {
      background: #d97706;
      box-shadow: 0 0 6px rgba(217, 119, 6, 0.35);
    }

    .foot span {
      font-size: 10px;
      color: rgba(140, 140, 148, 0.85);
    }
  </style>
</head>
<body>
  <header class="hdr">
    <h1>Mindmap</h1>
    <span class="ver">v1.0.0</span>
  </header>

  <main class="main">
    <div class="row">
      <span>On</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="row">
      <span>Auto-expand</span>
      <label class="toggle">
        <input type="checkbox" id="autoExpand">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="slider-row">
      <div class="slider-top">
        <span>Threshold</span>
        <span class="slider-val" id="thresholdValue">0%</span>
      </div>
      <input type="range" id="threshold" min="0" max="100" value="0">
    </div>

    <details class="advanced">
      <summary>Overrides</summary>
      <div class="adv-body">
        <div>
          <label for="apiEndpoint">Backend URL</label>
          <input type="text" class="text-input" id="apiEndpoint" placeholder="…--app.modal.run" spellcheck="false">
        </div>
        <div>
          <label for="apiKey">Claude key</label>
          <input type="password" class="text-input" id="apiKey" placeholder="sk-ant-…" spellcheck="false">
        </div>
      </div>
    </details>
  </main>

  <footer class="foot">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">…</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
